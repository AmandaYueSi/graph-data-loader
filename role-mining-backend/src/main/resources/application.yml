spring:
  application:
    name: role-mining-backend
  jackson:
    property-naming-strategy: SNAKE_CASE

server:
  port: 8080

app:
  security:
    default-user-id: "11111111-1111-1111-1111-111111111111"
  data:
    role-candidates-path: "${ROLE_CANDIDATES_PATH:../role_candidates_v1.json}"
    review-overlays-path: "${ROLE_CANDIDATE_REVIEWS_PATH:data/role-candidate-reviews.json}"
    ownership-scoping-enabled: false
  neo4j:
    uri: "${NEO4J_URI:neo4j://127.0.0.1:7687}"
    username: "${NEO4J_USERNAME:neo4j}"
    password: "${NEO4J_PASSWORD:your_password}"
  ai:
    open-ai-api-key: "${OPENAI_API_KEY:your_api_key_here}"
    aws-region: "${AWS_REGION:us-east-1}"
    aws-access-key-id: "${AWS_ACCESS_KEY_ID:}"
    aws-secret-access-key: "${AWS_SECRET_ACCESS_KEY:}"
    aws-session-token: "${AWS_SESSION_TOKEN:}"
    bedrock-model-id: "${BEDROCK_MODEL_ID:mistral.mistral-large-2402-v1:0}"


management:
  endpoints:
    web:
      exposure:
        include: "*"
    shutdown:
      enabled: true
  endpoint:
    shutdown:
      enabled: true
    
